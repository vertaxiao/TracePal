<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Dog: front-facing, round head, short floppy ears, clear snout/muzzle -->
  <!-- Head outline: wide round shape -->
  <path d="
    M 150,48
    C 100,48 62,90 62,145
    C 62,185 80,215 110,235
    L 110,250
    C 110,260 120,265 130,260
    L 135,248
    C 140,250 160,250 165,248
    L 170,260
    C 180,265 190,260 190,250
    L 190,235
    C 220,215 238,185 238,145
    C 238,90 200,48 150,48
    Z
  " fill="none" stroke="#B89628" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left ear: short, rounded, floppy -->
  <path d="
    M 90,100
    C 72,80 60,75 55,85
    C 48,100 58,120 78,125
  " fill="none" stroke="#B89628" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right ear: short, rounded, floppy -->
  <path d="
    M 210,100
    C 228,80 240,75 245,85
    C 252,100 242,120 222,125
  " fill="none" stroke="#B89628" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Eyes -->
  <circle cx="120" cy="140" r="10" fill="none" stroke="#B89628" stroke-width="3"/>
  <circle cx="180" cy="140" r="10" fill="none" stroke="#B89628" stroke-width="3"/>
  <!-- Snout/muzzle: prominent rounded rectangle projecting forward -->
  <ellipse cx="150" cy="190" rx="30" ry="22" fill="none" stroke="#B89628" stroke-width="3.5"/>
  <!-- Nose -->
  <ellipse cx="150" cy="180" rx="12" ry="8" fill="#B89628"/>
  <!-- Mouth line from nose down -->
  <path d="M 150,188 L 150,198 M 142,200 C 146,206 154,206 158,200" fill="none" stroke="#B89628" stroke-width="2.5" stroke-linecap="round"/>
</svg>
