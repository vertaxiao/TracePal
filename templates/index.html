<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>TracePal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- Navigation bar (matches WordPal style) -->
  <div class="nav-bar">
    <span class="nav-logo">TracePal</span>
    <span class="nav-tagline">Tracing Practice</span>
  </div>

  <div class="container">

    <!-- Shape name label -->
    <div class="shape-label" id="shape-label">Circle</div>

    <!-- Canvas wrapper: square aspect ratio, holds canvas + overlays -->
    <div class="canvas-wrapper" id="canvas-wrapper">
      <canvas id="trace-canvas"></canvas>

      <!-- Start indicator: blinking dot shown at path start -->
      <div class="start-indicator" id="start-indicator">
        <div class="start-dot"></div>
        <span class="start-label">START</span>
      </div>
    </div>

    <!-- Feedback message (on-track / off-track / complete) -->
    <div class="feedback-msg" id="feedback-msg"></div>

    <!-- Progress bar -->
    <div class="progress-wrap">
      <div class="progress" style="height: 10px;">
        <div class="progress-bar bg-success" id="progress-bar" role="progressbar"
             style="width: 0%; transition: width 0.1s linear;" aria-valuenow="0"
             aria-valuemin="0" aria-valuemax="100"></div>
      </div>
    </div>

    <!-- Prev / Reset / Next / Mute -->
    <div class="nav-buttons">
      <button class="btn btn-outline-secondary nav-btn" id="prev-btn">&#8592; Prev</button>
      <button class="btn btn-outline-primary nav-btn"   id="reset-btn">Reset</button>
      <button class="btn btn-outline-info nav-btn"     id="shuffle-btn">&#x1F500; Shuffle</button>
      <button class="btn btn-outline-secondary nav-btn" id="next-btn">Next &#8594;</button>
      <button class="btn btn-outline-secondary nav-btn" id="mute-btn">&#128266; Mute</button>
    </div>

    <!-- Dot indicators (one per image) -->
    <div class="dot-indicators" id="dot-indicators"></div>

    <!-- Instruction hint -->
    <div class="hint-text">Trace the outline with your finger or pencil</div>

  </div><!-- /container -->

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/static/js/main.js"></script>
</body>
</html>
